# Validate documentation changes on pull requests, before they reach main.
# Two checks run in parallel:
#   build-docs : fast MkDocs --strict build (broken nav / dead links / bad markdown)
#   build-pdf  : the full Pandoc/LaTeX PDF build, using the same pinned image as the
#                deploy workflow, so a PR that breaks the PDF fails here instead of
#                only surfacing on the post-merge release build.
name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup python environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
          cache: pip

      - name: Install mkdocs theme
        run: pip install -r requirements.txt

      # Regenerate includes/references.md from the Section 10 reference tables so
      # shorthand links like [OpenID4VCI] resolve. The file is also committed, but
      # regenerating here keeps it in sync if the tables change without a rerun.
      - name: Generate reference link definitions
        run: python3 tools/gen_references.py

      # annex-2.02 and annex-2.03 are generated from hltr/high-level-requirements.csv
      # but committed, since the PDF build consumes them directly. Regenerate and fail
      # if a PR changed the CSV (or hand-edited the markdown) without running the
      # generator, so the committed files never drift from the CSV.
      - name: Check Annex 2 requirements markdown is in sync with the HLTR CSV
        run: |
          make hltr
          git diff --exit-code docs/annexes/annex-2/ || {
            echo "::error::docs/annexes/annex-2 is out of sync with hltr/high-level-requirements.csv. Run 'make hltr' and commit the regenerated markdown."
            exit 1
          }

      # Report-only: --strict surfaces every broken link / nav / markdown issue in
      # the log, but continue-on-error keeps it from blocking PRs while the large
      # backlog of pre-existing broken internal links is worked down separately.
      # Drop continue-on-error once the site builds clean under --strict.
      - name: Build site (strict, report-only)
        continue-on-error: true
        run: mkdocs build --strict

  build-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read # pull the GHCR build image
    # Same reproducible toolchain (pandoc + Eisvogel + curated TeX Live + make) as
    # the release build in pages.yml — keep this digest in sync with pages.yml.
    # Note: pull requests opened from forks cannot read the org's GHCR package, so
    # this job only validates PRs from branches within this repository.
    container:
      image: ghcr.io/eu-digital-identity-wallet/arf-pdf-builder@sha256:e0d19dabca3a03ba8c716976b72f6b819751ff41ea223fb7fb3468122aa3ef05
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build pdf
        run: make pdfs
