# Validate documentation changes on pull requests, before they reach main.
# Three checks run in parallel:
#   build-docs    : fast MkDocs --strict build (broken nav / dead links / bad markdown)
#   build-pdf     : the full Pandoc/LaTeX PDF build, using the same pinned image as the
#                   deploy workflow, so a PR that breaks the PDF fails here instead of
#                   only surfacing on the post-merge release build.
#   docs-quality  : blocking link / reference / typo gate — internal links + section
#                   anchors (MkDocs), external URLs (lychee) and typos (codespell),
#                   scoped to the files a PR changes so the pre-existing backlog is
#                   burned down incrementally instead of blocking unrelated PRs.
name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup python environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
          cache: pip

      - name: Install mkdocs theme
        run: pip install -r requirements.txt

      # Regenerate includes/references.md from the Section 10 reference tables so
      # shorthand links like [OpenID4VCI] resolve. The file is also committed, but
      # regenerating here keeps it in sync if the tables change without a rerun.
      - name: Generate reference link definitions
        run: python3 tools/gen_references.py

      # annex-2.02 and annex-2.03 are generated from hltr/high-level-requirements.csv
      # but committed, since the PDF build consumes them directly. Regenerate and fail
      # if a PR changed the CSV (or hand-edited the markdown) without running the
      # generator, so the committed files never drift from the CSV.
      - name: Check Annex 2 requirements markdown is in sync with the HLTR CSV
        run: |
          make hltr
          git diff --exit-code docs/annexes/annex-2/ || {
            echo "::error::docs/annexes/annex-2 is out of sync with hltr/high-level-requirements.csv. Run 'make hltr' and commit the regenerated markdown."
            exit 1
          }

      # --strict fails on any broken link / nav / section anchor / markdown
      # issue. The backlog is cleared and mkdocs.yml now validates anchors and
      # absolute links, so this is a hard gate (blocking) on the real site config.
      - name: Build site (strict)
        run: mkdocs build --strict

  build-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read # pull the GHCR build image
    # Same reproducible toolchain (pandoc + Eisvogel + curated TeX Live + make) as
    # the release build in pages.yml — keep this digest in sync with pages.yml.
    # Note: pull requests opened from forks cannot read the org's GHCR package, so
    # this job only validates PRs from branches within this repository.
    container:
      image: ghcr.io/eu-digital-identity-wallet/arf-pdf-builder@sha256:e0d19dabca3a03ba8c716976b72f6b819751ff41ea223fb7fb3468122aa3ef05
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build pdf
        # -j"$(nproc)": the per-document and combined PDFs are independent
        # LuaLaTeX compiles; build them in parallel (Makefile orders the zip last).
        run: make -j"$(nproc)" pdfs

  docs-quality:
    # Link / reference / typo gate (PR-only). Internal links and section anchors
    # are validated repo-wide (the backlog is cleared). Typos and external URLs
    # are scoped to the Markdown a PR changes — typos because the allowlist is
    # young, external URLs because pre-existing link rot must not block unrelated
    # PRs. See tools/check_doc_links.py, .codespellrc and lychee.toml.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # need history back to the PR base to compute the diff

      - name: Setup python environment
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.x
          cache: pip

      - name: Install docs toolchain (mkdocs + codespell)
        # Pin codespell so a new release's dictionary can't change the gate's
        # verdict without an intentional bump.
        run: pip install -r requirements.txt codespell==2.4.2

      # The link build resolves [shorthand] references from includes/references.md,
      # so regenerate it first (same as build-docs).
      - name: Generate reference link definitions
        run: python3 tools/gen_references.py

      - name: Determine changed Markdown files
        id: changed
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          git diff --name-only --diff-filter=ACMR "$base_sha" HEAD \
            | grep -E '^(docs|includes)/.*\.md$' > changed_md.txt || true
          echo "Changed Markdown files:"; cat changed_md.txt || true
          echo "count=$(wc -l < changed_md.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "files=$(paste -sd' ' changed_md.txt)" >> "$GITHUB_OUTPUT"

      # 1) Internal links + section anchors (MkDocs), repo-wide: not-found /
      #    unrecognized / nav / anchors / absolute links all block, anywhere.
      - name: Check internal links and anchors
        if: ${{ !cancelled() }}
        run: python3 tools/check_doc_links.py

      # 2) Typos on the changed Markdown (allowlist of house terminology lives in
      #    .codespellrc, which codespell picks up from the repo root).
      - name: Check typos
        if: ${{ !cancelled() && steps.changed.outputs.count != '0' }}
        run: codespell $(cat changed_md.txt)

      # 3) External http(s) URLs on the changed Markdown (config in lychee.toml,
      #    skip-list in .lycheeignore). GITHUB_TOKEN avoids github.com rate limits.
      - name: Check external links
        if: ${{ !cancelled() && steps.changed.outputs.count != '0' }}
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        # Don't set lycheeVersion: this action's installer untars without
        # --strip-components and expects the binary at the archive root, which
        # only holds for the version it ships (v0.23.0). lychee >= v0.24 nests
        # the binary in a platform subdir, so a newer pin fails to install. The
        # pinned action SHA keeps the default lychee version reproducible.
        with:
          args: "--config lychee.toml --no-progress ${{ steps.changed.outputs.files }}"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
