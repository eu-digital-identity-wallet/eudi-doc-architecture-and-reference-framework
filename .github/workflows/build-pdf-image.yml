# Build, smoke-test and publish the pinned PDF build image to GHCR.
#
# The image (pandoc + Eisvogel + curated TeX Live + make) gives the PDF build a
# fully reproducible toolchain, removing the residual risk of a floating pandoc
# version or an incomplete apt package set. The image is only pushed if it can
# actually build the ARF PDF, so a broken image can never reach consumers.
name: Build PDF builder image

on:
  push:
    branches: ["main"]
    paths:
      - "docker/Dockerfile"
      - ".github/workflows/build-pdf-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-pdf-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/arf-pdf-builder

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (load locally for smoke test)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./docker
          load: true
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — build the ARF PDFs inside the image
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" -w /data \
            ${{ env.IMAGE }}:ci make -j"$(nproc)" pdfs
          test -s build/pdf/architecture-and-reference-framework-main-and-annexes.pdf

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (only reached if the smoke test passed)
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./docker
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha

      - name: Report image digest to pin in pages.yml
        run: |
          echo "## PDF builder image published" >> "$GITHUB_STEP_SUMMARY"
          echo "Pin this digest in \`.github/workflows/pages.yml\`:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
